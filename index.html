<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5ede2;font-family:'Sarabun','Segoe UI',sans-serif;color:#2b2320;min-height:100vh;}
#root{max-width:820px;margin:0 auto;padding:16px 12px 40px;}
:root{--m:#8a0c28;--g:#c9a84c;--cream:#fdf8f1;--line:#e7d9c9;--green:#2e7d32;--red:#c62828;}

.sub{font-size:13px;color:#7a6a5d;margin-top:3px;}
label{display:block;font-size:13.5px;font-weight:700;color:#5a3a2b;margin-bottom:5px;}
input[type=text],input[type=password],select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;}

.field{margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.qblock{margin-bottom:20px;padding-bottom:18px;border-bottom:1.5px solid var(--line);}
.qblock:last-child{border-bottom:none;}
.qh{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px;}
.qn{background:var(--m);color:#fff;min-width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
.qt{font-size:15px;font-weight:600;line-height:1.5;}
.opt{display:flex;align-items:flex-start;gap:8px;margin:7px 0 0 36px;padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;line-height:1.4;transition:border-color .15s;}

.opt.sel{border-color:var(--m);background:#fbeef1;}
.opt.ok{border-color:var(--green);background:#e9f7ec;}
.opt.ng{border-color:var(--red);background:#fbeae8;}
.ol{font-weight:700;color:var(--m);flex-shrink:0;}
.st{font-size:15px;font-weight:800;color:var(--m);margin:20px 0 12px;padding:7px 13px;background:#fbeef1;border-left:4px solid var(--m);border-radius:4px;}
.mr{display:flex;gap:9px;align-items:flex-start;margin:8px 0 0 36px;}
.ml{flex:1;min-width:100px;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;background:#fff;font-size:13.5px;line-height:1.4;}
.mr select{flex:2;min-width:150px;width:100%;padding:8px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;}
.mr.ok .ml{border-color:var(--green);background:#e9f7ec;}
.mr.ng .ml{border-color:var(--red);background:#fbeae8;}
.rs{text-align:center;padding:20px 0 14px;}
.bp{font-size:60px;font-weight:900;color:var(--m);line-height:1;}
.bs{color:#7a6a5d;font-size:14px;margin-top:5px;}
.badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12.5px;font-weight:700;background:#f3e6d6;color:#7a3b1d;margin:4px 3px;}
.gA{background:#e9f7ec;color:#1b5e20;}.gB{background:#e3f2fd;color:#0d47a1;}.gC{background:#fff8e1;color:#f57f17;}.gD{background:#fbeae8;color:#b71c1c;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top;}
th{background:#f3e6d6;font-weight:700;}
tr:nth-child(even) td{background:#fdf8f4;}
.lk{color:var(--m);font-size:12.5px;cursor:pointer;text-decoration:underline;display:block;text-align:right;margin-top:12px;}
.alert{background:#fbeef1;border:1.5px solid #e8a0b0;border-radius:8px;padding:10px 13px;font-size:13px;color:#7c0b25;margin-bottom:12px;}
.fb{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11.5px;font-weight:700;}
.fF{background:#e3f2fd;color:#0d47a1;}.fP{background:#fff8e1;color:#e65100;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
@media(max-width:500px){.cg{grid-template-columns:1fr;}}
.cb{background:#fff;border:2px solid var(--line);border-radius:10px;padding:12px 10px;cursor:pointer;text-align:left;transition:border-color .15s;}
.cb:hover{border-color:var(--m);}
.cb.active{border-color:var(--m);background:#fbeef1;}
.cn{font-size:11px;color:#9a7a6a;margin-bottom:3px;}
.ct{font-size:14px;font-weight:700;color:var(--m);line-height:1.3;}
.ce{font-size:12px;color:#7a6a5d;}
</style>
</head>

    setLa(false);
  };
  const gr=s=>{if(s>=80)return['A ยอดเยี่ยม','gA'];if(s>=70)return['B ดีมาก','gB'];if(s>=60)return['C ปานกลาง','gC'];return['D ต้องปรับปรุง','gD'];};
  const secs=[...new Set((ch?.mcq||[]).map(q=>q.sec))];
  if(stage==='home') return(
    <div>
      <div className="card">
        <div style={{borderBottom:'3px solid var(--m)',paddingBottom:12,marginBottom:16}}>
          <h1>📚 แบบทดสอบตำราเวชศาสตร์ผู้สูงวัย</h1>
          <div className="sub">โรงพยาบาลจุฬาลงกรณ์ สภากาชาดไทย — เลือกบทที่ต้องการทดสอบ (50 ข้อต่อบท)</div>
        </div>
        <div className="field"><label>เลือกบทที่ต้องการทดสอบ *</label>
          <div className="cg">
            {CH.map((c,i)=>(
              <div key={i} className={`cb${ci===i?' active':''}`} onClick={()=>setCi(i)}>
                <div className="cn">บทที่ {c.num}</div>
                <div className="ct">{c.titleTH}</div>
                <div className="ce">{c.title}</div>
                <div style={{fontSize:11,color:'var(--m)',marginTop:3,fontWeight:700}}>40 MCQ + 10 จับคู่ = 50 ข้อ</div>
              </div>
            ))}
          </div>
        </div>
        <div className="row2">
          <div className="field"><label>ชื่อ *</label><input type="text" value={fn} onChange={e=>setFn(e.target.value)} placeholder="กรอกชื่อ"/></div>
          <div className="field"><label>นามสกุล *</label><input type="text" value={ln} onChange={e=>setLn(e.target.value)} placeholder="กรอกนามสกุล"/></div>
        </div>
        <div className="field"><label>ประเภทเภสัชกร *</label>
          <select value={pt} onChange={e=>setPt(e.target.value)}>
            <option value="">-- เลือกประเภท --</option>
            <option value="FULLTIME">เภสัชกร FULLTIME</option>
            <option value="PART-TIME">เภสัชกร PART-TIME</option>
          </select>
        </div>
        {ne&&<div className="alert">{ne}</div>}
        <button className="btn" onClick={go}>เริ่มทำแบบทดสอบ</button>
        <span className="lk" onClick={openA}>🔐 Admin</span>
      </div>
    </div>
  );
  if(stage==='quiz'){
    const pp=Math.round((ans/TOT)*100);
    return(<div>
      <div className="card" style={{padding:'16px 18px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
          <span style={{fontSize:13.5,fontWeight:700,color:'var(--m)'}}>{fn} {ln} <span className={`fb f${pt==='FULLTIME'?'F':'P'}`}>{pt}</span></span>
          <span style={{fontSize:12,color:'#7a6a5d'}}>{ans}/{TOT} ข้อ</span>
        </div>
        <div style={{fontSize:12,color:'#7a6a5d',marginBottom:5}}>บทที่ {ch.num}: {ch.titleTH}</div>
        <div className="pt"><span>ความคืบหน้า</span><span>{pp}%</span></div>
        <div className="pw"><div className="pb" style={{width:pp+'%'}}></div></div>
      </div>
      {secs.map(sec=>{
        const qs=ch.mcq.map((q,i)=>({...q,qi:i})).filter(q=>q.sec===sec);
        return(<div key={sec} className="card">
          <div className="st">📌 {sec}</div>
          {qs.map(({q,o,c,qi})=>(
            <div className="qblock" key={qi}>
              <div className="qh"><div className="qn">{qi+1}</div><div className="qt">{q}</div></div>
              {o.map((opt,oi)=>{let cls='opt';if(ma[qi]!==null){if(oi===c)cls+=' ok';else if(oi===ma[qi])cls+=' ng';}return(<div key={oi} className={cls} onClick={()=>sm(qi,oi)}><span className="ol">{String.fromCharCode(65+oi)}.</span><span>{opt}</span></div>);})}
            </div>
          ))}
        </div>);
      })}
      {ch.match.map((m,si)=>{
        const off=ch.mcq.length+ch.match.slice(0,si).reduce((s,x)=>s+x.left.length,0);
        return(<div key={si} className="card">
          <div className="st">🔗 {m.title}</div>
          {m.left.map((item,li)=>(
            <div className="qblock" key={li}>
              <div className="qh"><div className="qn">{off+li+1}</div><div className="qt">จับคู่: <strong>{item}</strong></div></div>
              {(()=>{const answered=xa[si]&&xa[si][li]!=='';const ok=answered&&xa[si][li]===m.right[m.correct[li]];const cls=answered?(ok?'mr ok':'mr ng'):'mr';return(<div className={cls}><div className="ml">{item}</div><div style={{flex:2}}><select value={xa[si]?xa[si][li]:''} onChange={e=>sx(si,li,e.target.value)} style={{width:'100%',padding:'8px',border:`1.5px solid ${answered?(ok?'var(--green)':'var(--red)'):'var(--line)'}`,borderRadius:'7px',fontSize:'13px',fontFamily:'inherit',background:answered?(ok?'#e9f7ec':'#fbeae8'):'#fff'}}><option value="">-- เลือก --</option>{sr[si]&&sr[si].map((opt,oi)=><option key={oi} value={opt}>{opt}</option>)}</select>{answered&&!ok&&<div style={{fontSize:'11.5px',color:'var(--green)',marginTop:'4px'}}>✓ เฉลย: {m.right[m.correct[li]]}</div>}</div></div>);})()}
            </div>
          ))}
        </div>);
      })}
      <div className="card">
        <button className="btn" disabled={ans<TOT} onClick={submit}>ส่งคำตอบ</button>
        {ans<TOT&&<p style={{textAlign:'center',fontSize:12,color:'#a87060',marginTop:7}}>ยังตอบไม่ครบ — เหลือ {TOT-ans} ข้อ</p>}
      </div>
    </div>);
  }
  if(stage==='result'){
    const [gl,gc]=gr(sc);
    return(<div>
      <div className="card">
        <div className="rs">
          <div className="bp">{sc}%</div>
          <div className="bs">ตอบถูก <strong>{cc}</strong> จาก <strong>{TOT}</strong> ข้อ</div>
          <div style={{marginTop:8}}><span className={`badge ${gc}`}>{gl}</span><span className={`fb f${pt==='FULLTIME'?'F':'P'}`} style={{marginLeft:6}}>{pt}</span></div>
          <div style={{fontSize:13,color:'#7a6a5d',marginTop:6}}>{fn} {ln} | บทที่ {ch.num}: {ch.titleTH}</div>
        </div>
      </div>
      {secs.map(sec=>{
        const qs=ch.mcq.map((q,i)=>({...q,qi:i})).filter(q=>q.sec===sec);
        return(<div key={sec} className="card">
          <div className="st">📌 {sec}</div>
          {qs.map(({q,o,c:ca,qi})=>(
            <div className="qblock" key={qi}>
              <div className="qh"><div className="qn">{qi+1}</div><div className="qt">{q}</div></div>
              {o.map((opt,oi)=>{let cls='opt';if(oi===ca)cls+=' ok';else if(oi===ma[qi])cls+=' ng';return(<div key={oi} className={cls}><span className="ol">{String.fromCharCode(65+oi)}.</span><span>{opt}</span></div>);})}
            </div>
          ))}
        </div>);
      })}
      {ch.match.map((m,si)=>{
        const off=ch.mcq.length+ch.match.slice(0,si).reduce((s,x)=>s+x.left.length,0);
        return(<div key={si} className="card">
          <div className="st">🔗 {m.title}</div>
          {m.left.map((item,li)=>{const ok=xa[si]&&xa[si][li]===m.right[m.correct[li]];return(
            <div className="qblock" key={li}>
              <div className="qh"><div className="qn">{off+li+1}</div><div className="qt">{item}</div></div>
              <div className={`mr ${ok?'ok':'ng'}`}><div className="ml">{item}</div><div style={{flex:2,padding:'9px 11px',border:`1.5px solid ${ok?'var(--green)':'var(--red)'}`,borderRadius:7,background:ok?'#e9f7ec':'#fbeae8',fontSize:13.5}}>
                {xa[si]&&xa[si][li]||'(ไม่ได้ตอบ)'}
                {!ok&&<div style={{fontSize:11.5,color:'var(--green)',marginTop:4}}>✓ เฉลย: {m.right[m.correct[li]]}</div>}
              </div></div>
            </div>
          );})}
        </div>);
      })}
      <div className="card" style={{display:'flex',gap:10}}>
        <button className="btn btn-s" onClick={()=>{setSub(false);setStage('home');}}>กลับหน้าหลัก</button>
        <div style={{flex:1}}/>
        <div style={{fontSize:12,color:'#9a7a6a',alignSelf:'center'}}>คะแนนถูกบันทึกแล้ว</div>
      </div>
    </div>);
  }
  if(stage==='alog') return(<div className="card">
    <h1 style={{marginBottom:12}}>🔐 Admin Login</h1>
    <div className="field"><label>PIN</label><input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&chkP()} placeholder="กรอก PIN"/></div>
    {pe&&<div className="alert">{pe}</div>}
    <div style={{display:'flex',gap:10}}><button className="btn" onClick={chkP} disabled={la}>{la?'กำลังโหลด...':'ยืนยัน'}</button><button className="btn btn-s" onClick={()=>setStage('home')}>กลับ</button></div>
  </div>);
  if(stage==='aview'){
    const avg=a=>a.length?Math.round(a.reduce((s,r)=>s+r.score,0)/a.length*10)/10:'-';
    const ft=ar.filter(r=>r.type==='FULLTIME');const pt2=ar.filter(r=>r.type==='PART-TIME');
    return(<div className="card">
      <h1 style={{marginBottom:6}}>📊 ผลคะแนนทั้งหมด ({ar.length} รายการ)</h1>
      <div className="sub" style={{marginBottom:14}}>FULLTIME {ft.length} คน avg {avg(ft)}% | PART-TIME {pt2.length} คน avg {avg(pt2)}%</div>
      <table><thead><tr><th>#</th><th>ชื่อ-นามสกุล</th><th>ประเภท</th><th>บท</th><th>%</th><th>ถูก/รวม</th><th>เวลา</th></tr></thead><tbody>
        {ar.length===0&&<tr><td colSpan="7" style={{textAlign:'center',color:'#999',padding:14}}>ยังไม่มีข้อมูล</td></tr>}
        {ar.map((r,i)=>(<tr key={i}><td>{i+1}</td><td>{r.name}</td><td><span className={`fb f${r.type==='FULLTIME'?'F':'P'}`}>{r.type}</span></td><td style={{fontSize:11.5}}>{r.ch}</td><td><strong>{r.score}</strong></td><td>{r.correct}/{r.total}</td><td style={{fontSize:11}}>{r.time}</td></tr>))}
      </tbody></table>
      <button className="btn btn-s" style={{marginTop:14}} onClick={()=>setStage('home')}>กลับ</button>
    </div>);
  }
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
